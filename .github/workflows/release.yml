name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Python dependencies
      run: |
        brew install python@3.11 pipx
        pipx install setuptools

    - name: Install dependencies
      run: npm ci

    - name: Build M1 (arm64)
      run: npm run build:arm64
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        npm_config_build_from_source: true

    - name: Build Intel (x64)
      run: npm run build:x64
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        npm_config_build_from_source: true

    - name: Build Universal
      run: npm run build:universal
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        npm_config_build_from_source: true

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/SiteSeeker-*-arm64-mac.pkg
          dist/SiteSeeker-*-x64-mac.pkg
          dist/SiteSeeker-*-universal-mac.pkg
          dist/*.blockmap
          dist/latest-mac.yml
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
