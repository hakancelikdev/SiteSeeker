name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Python dependencies
      run: |
        brew install python@3.11
        python3 -m venv .venv
        source .venv/bin/activate
        python3 -m pip install --upgrade pip
        python3 -m pip install setuptools

    - name: Install dependencies
      run: npm ci

    - name: Build M1 (arm64)
      run: npm run build:arm64
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        npm_config_build_from_source: true

    - name: Build Intel (x64)
      run: npm run build:x64
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        npm_config_build_from_source: true

    - name: Build Universal
      run: npm run build:universal
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        npm_config_build_from_source: true

    - name: Build MAS (Mac App Store)
      run: npm run build:mas
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        npm_config_build_from_source: true

    - name: Upload to App Store Connect
      run: |
        xcrun altool --upload-app --type macos --file "dist/SiteSeeker-*-universal-mas.pkg" --username "${{ secrets.APPLE_ID }}" --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/SiteSeeker-*-arm64-mac.pkg
          dist/SiteSeeker-*-x64-mac.pkg
          dist/SiteSeeker-*-universal-mac.pkg
          dist/SiteSeeker-*-universal-mas.pkg
          dist/*.blockmap
          dist/latest-mac.yml
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  testflight:
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build MAS (Mac App Store)
      run: npm run build:mas
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        npm_config_build_from_source: true

    - name: Upload to TestFlight
      run: |
        xcrun altool --upload-app --type macos --file "dist/SiteSeeker-*-universal-mas.pkg" --username "${{ secrets.APPLE_ID }}" --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    - name: Notify TestFlight Upload
      run: |
        echo "✅ TestFlight'a yüklendi! Build: ${{ github.sha }}"
        echo "📱 TestFlight'ta test edebilirsin"
