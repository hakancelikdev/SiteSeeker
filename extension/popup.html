<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #333;
        }

        .status {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            padding: 8px;
            border-radius: 6px;
            background: #f5f5f5;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .connected {
            background-color: #34c759;
        }

        .disconnected {
            background-color: #ff3b30;
        }

        .status-text {
            font-size: 14px;
            font-weight: 500;
        }

        .info {
            font-size: 13px;
            line-height: 1.4;
            color: #666;
        }

        .info p {
            margin: 8px 0;
        }

        .button {
            display: inline-block;
            padding: 8px 16px;
            margin-top: 12px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .button:hover {
            background-color: #0051a8;
        }
    </style>
</head>
<body>
    <div class="status">
        <div id="status-indicator" class="status-indicator"></div>
        <span id="status-text" class="status-text">Checking connection...</span>
    </div>

    <div class="info">
        <p>Fast History Search extension is monitoring your browser history for seamless search experience.</p>
        <p>Make sure the Fast History Search application is running to enable history synchronization.</p>
    </div>

    <a href="https://github.com/hakancelikdev/FastHistorySearch" target="_blank" class="button">Learn More</a>

    <script src="popup.js"></script>
</body>
</html>
