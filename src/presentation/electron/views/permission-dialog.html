<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="SiteSeeker - Browser Data Access Permission">
        <meta name="theme-color" content="#ffffff">
        <title>SiteSeeker - Permission Required</title>
        <link rel="stylesheet" href="styles/permission-dialog.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
        <script>
            window.onerror = function(msg, url, lineNo, columnNo, error) {
                console.error('Window Error:', msg, url, 'Line:', lineNo, 'Column:', columnNo, 'Error:', error);
                return false;
            };
        </script>
    </head>
<body data-theme="dark">
    <div class="permission-container">
        <div class="permission-content">
            <div class="permission-header">
                <div class="app-icon">
                    <i class="fas fa-search"></i>
                </div>
                <h1 class="app-title">SiteSeeker</h1>
                <h2 class="permission-title">Browser Data Access Required</h2>
            </div>
            
            <div class="permission-body">
                <p class="permission-description">
                    SiteSeeker needs to read your browser data to import history and bookmarks. 
                    We only read the data and never modify or share it.
                </p>
                
                <div class="permission-paths">
                    <h3 class="paths-title">We will read from these folders:</h3>
                    <div class="path-list" id="pathList">
                        <!-- Paths will be populated by JavaScript -->
                    </div>
                </div>
                
                <div class="permission-note">
                    <i class="fas fa-info-circle"></i>
                    <span>Your data stays on your device and is never shared</span>
                </div>
            </div>
            
            <div class="permission-actions">
                <button class="permission-btn secondary" id="permissionSkip">
                    Skip for Now
                </button>
                <button class="permission-btn primary" id="permissionGrant">
                    <i class="fas fa-check"></i>
                    Allow Access
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // Check if required APIs are available
        window.addEventListener('load', () => {
            console.log('Permission dialog window loaded');
            if (!window.api) {
                console.error('window.api is not available');
                document.body.innerHTML = '<div class="error">Error: Application API is not available. Please restart the application.</div>';
            }
        });
    </script>
    <script src="scripts/permission-dialog.js"></script>
</body>
</html>
