<!DOCTYPE html>
<html>
<head>
    <title>Fast History Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: rgba(28, 28, 28, 0.95);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            border-radius: 10px;
            overflow: hidden;
        }

        #search-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #search-input {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
        }

        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        #results-container {
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }

        .results-header {
            padding: 8px 12px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 8px;
        }

        .result-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 6px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .result-icon {
            width: 16px;
            height: 16px;
            object-fit: contain;
        }

        .result-content {
            flex: 1;
        }

        .result-title {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .result-url {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .result-score {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            margin-left: auto;
        }

        #toolbar {
            display: flex;
            justify-content: flex-end;
            padding: 8px;
            margin-bottom: 10px;
        }

        .toolbar button {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .toolbar button:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .toolbar button i {
            font-size: 16px;
        }

        #notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        /* macOS tarzı scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .notification {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button onclick="importHistory()" title="Tarayıcı Geçmişlerini İçe Aktar">
            <i class="fas fa-download"></i>
            Geçmişi İçe Aktar
        </button>
    </div>
    <div id="search-container">
        <input type="text" id="search-input" placeholder="Geçmişte ara... (⌘ + Shift + Space)" autofocus>
        <div id="results-container"></div>
    </div>
    <div id="notification"></div>

    <script>
        const { ipcRenderer } = require('electron');
        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('results-container');
        const notification = document.getElementById('notification');

        let debounceTimeout;

        function showNotification(message, isError = false, isWarning = false) {
            notification.textContent = message;
            notification.style.backgroundColor = isError ? 'rgba(255, 0, 0, 0.8)' : 
                                               isWarning ? 'rgba(255, 165, 0, 0.8)' : 
                                               'rgba(0, 0, 0, 0.8)';
            notification.style.display = 'block';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 5000);
        }

        function importHistory() {
            ipcRenderer.send('import-chrome-history');
            showNotification('Tarayıcı geçmişleri içe aktarılıyor...');
        }

        ipcRenderer.on('import-complete', (event, result) => {
            if (result.success) {
                if (result.safariPermissionError) {
                    showNotification(
                        'Geçmişler içe aktarıldı, ancak Safari geçmişine erişim izni yok. Safari geçmişini eklemek için System Preferences > Security & Privacy > Full Disk Access\'den uygulamaya izin verin.',
                        false,
                        true
                    );
                } else {
                    showNotification('Tarayıcı geçmişleri başarıyla içe aktarıldı!');
                }
            } else {
                showNotification('Geçmiş içe aktarılırken bir hata oluştu: ' + result.error, true);
            }
        });

        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimeout);
            const searchTerm = e.target.value.trim();

            if (searchTerm.length === 0) {
                resultsContainer.style.display = 'none';
                return;
            }

            debounceTimeout = setTimeout(() => {
                ipcRenderer.send('search-history', searchTerm);
            }, 300);
        });

        ipcRenderer.on('search-results', (event, results) => {
            if (results.length > 0) {
                resultsContainer.style.display = 'block';
                resultsContainer.innerHTML = `
                    <div class="results-header">
                        ${results.length} sonuç bulundu
                    </div>
                    ${results.map(result => `
                        <div class="result-item" onclick="openUrl('${result.url}')">
                            <img src="https://www.google.com/s2/favicons?domain=${new URL(result.url).hostname}" class="result-icon" onerror="this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='">
                            <div class="result-content">
                                <div class="result-title">${result.title}</div>
                                <div class="result-url">${result.url}</div>
                            </div>
                            <div class="result-score" title="Alaka puanı">
                                ${Math.round(result.score)}
                            </div>
                        </div>
                    `).join('')}`;

                // Pencere boyutunu ayarla
                const height = Math.min(60 + (results.length * 60) + 30, 400); // Header için +30px
                ipcRenderer.send('resize-window', height);
            } else {
                resultsContainer.style.display = 'block';
                resultsContainer.innerHTML = `
                    <div class="results-header">
                        Sonuç bulunamadı
                    </div>
                    <div class="result-item" style="cursor: default;">
                        Arama kriterlerinize uygun sonuç bulunamadı
                    </div>`;
                ipcRenderer.send('resize-window', 120);
            }
        });

        function openUrl(url) {
            ipcRenderer.send('open-url', url);
        }

        // Escape tuşu ile pencereyi kapatma
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                window.close();
            }
        });
    </script>
</body>
</html>
