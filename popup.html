<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Quick History</title>
    <style>
        body {
            width: 600px;
            margin: 0;
            padding: 10px;
            font-family: Arial, sans-serif;
        }

        #search {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        #results {
            max-height: 500px;
            overflow-y: auto;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .result-item:hover {
            background-color: #f5f5f5;
        }

        .left-section {
            flex: 1;
            margin-right: 10px;
            overflow: hidden;
        }

        .right-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        a {
            color: #1a0dab;
            text-decoration: none;
            display: block;
            margin-bottom: 4px;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        a:hover {
            text-decoration: underline;
        }

        .url {
            color: #006621;
            font-size: 12px;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .score {
            color: #666;
            font-size: 12px;
        }

        .star-icon {
            font-size: 16px;
            color: gold;
        }

        #url-count {
            margin-bottom: 10px;
            color: #666;
            font-size: 14px;
        }

        #loading {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
        }

        /* Scroll bar stilleri */
        #results::-webkit-scrollbar {
            width: 8px;
        }

        #results::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        #results::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        #results::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <input type="text" id="search" placeholder="Search in history and bookmarks...">
    <div id="url-count"></div>
    <ul id="results"></ul>
    <script src="popup.js"></script>
</body>
</html>
